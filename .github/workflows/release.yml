name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build stable release APK
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
          MAL_KEY: ${{ secrets.MAL_KEY }}
          ANILIST_KEY: ${{ secrets.ANILIST_KEY }}
        run: ./gradlew assembleStableRelease

      - name: Sign APK (if keystore provided)
        if: ${{ env.KEYSTORE_B64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > keystore.jks
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          for apk in app/build/outputs/apk/stable/release/*-unsigned.apk; do
            "$BUILD_TOOLS/apksigner" sign \
              --ks keystore.jks \
              --ks-pass env:KEYSTORE_PASSWORD \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass env:KEY_PASSWORD \
              --out "${apk/-unsigned/-signed}" "$apk"
          done

      - name: Collect APKs
        run: |
          mkdir -p out
          find app/build/outputs/apk/stable/release -name "*.apk" -exec cp {} out/ \;
          ls -la out/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
