name: Pre-release build

concurrency:
  group: "pre-release"
  cancel-in-progress: true

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '*.md'
      - '**/wiki/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore (optional)
        if: ${{ env.SIGNING_KEYSTORE_B64 != '' }}
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          export TMP_KEYSTORE_FILE_PATH="${RUNNER_TEMP}"/keystore
          mkdir -p "${TMP_KEYSTORE_FILE_PATH}"
          echo "${SIGNING_KEYSTORE_B64}" | base64 -d > "${TMP_KEYSTORE_FILE_PATH}/prerelease_keystore.keystore"

      - name: Build prerelease APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
          MAL_KEY: ${{ secrets.MAL_KEY }}
          ANILIST_KEY: ${{ secrets.ANILIST_KEY }}
        run: ./gradlew assemblePrerelease

      - name: Collect APK
        run: |
          mkdir -p out
          find app/build/outputs/apk/prerelease -name "*.apk" -exec cp {} out/WaveStream-prerelease.apk \;

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release
          name: WaveStream Pre-release
          prerelease: true
          files: out/WaveStream-prerelease.apk
          body: |
            Automatic pre-release build of WaveStream.
            Built from commit ${{ github.sha }}.
