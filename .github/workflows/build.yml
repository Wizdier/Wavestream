name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Bootstrap Gradle wrapper (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Build debug APK (push / PR)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: wavestream-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Decode signing keystore
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "=== Decoding keystore from KEYSTORE_BASE64 secret ==="
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/wavestream.keystore
          echo "KEYSTORE_FILE=$HOME/wavestream.keystore" >> $GITHUB_ENV
          echo "=== Keystore file info ==="
          ls -la $HOME/wavestream.keystore
          file $HOME/wavestream.keystore

      - name: Verify keystore is readable with provided credentials
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "=== Verifying keystore can be opened with KEYSTORE_PASSWORD ==="
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "❌ ERROR: KEYSTORE_PASSWORD secret is empty or not set!"
            exit 1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "❌ ERROR: KEY_ALIAS secret is empty or not set!"
            exit 1
          fi
          echo "KEY_ALIAS = $KEY_ALIAS"
          keytool -list -keystore "$KEYSTORE_FILE" -storepass "$KEYSTORE_PASSWORD" || {
            echo "❌ ERROR: Could not open keystore with provided password!"
            echo "This usually means KEYSTORE_PASSWORD is wrong, or KEYSTORE_BASE64 is corrupted."
            exit 1
          }
          echo "✅ Keystore opens successfully."

      - name: Build signed release APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate, verify, and rename release APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "=== Files in app/build/outputs/apk/release/ ==="
          ls -la app/build/outputs/apk/release/ || true
          echo ""
          cd app/build/outputs/apk/release

          APK_FILE=$(ls *.apk 2>/dev/null | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ ERROR: No APK file found in release output directory!"
            exit 1
          fi
          echo "Found APK: $APK_FILE"

          if [[ "$APK_FILE" == *unsigned* ]]; then
            echo "⚠️  WARNING: APK is UNSIGNED! KEY_PASSWORD may be wrong."
            mv "$APK_FILE" app-release.apk
          elif [ "$APK_FILE" != "app-release.apk" ]; then
            mv "$APK_FILE" app-release.apk
          fi

          echo "=== Verifying APK signature ==="
          APKSIGNER=$(ls $ANDROID_HOME/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose app-release.apk || echo "⚠️  APK signature verification failed"
          else
            if unzip -l app-release.apk | grep -qE "META-INF/.*\.(RSA|EC|DSA)"; then
              echo "✅ APK contains a signature file."
            else
              echo "⚠️  APK does NOT appear to be signed!"
            fi
          fi

          echo "=== Computing SHA-256 ==="
          sha256sum app-release.apk > app-release.apk.sha256
          cat app-release.apk.sha256
          ls -la

      - name: Upload release APK artifact
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: wavestream-release-apk
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release.apk.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          name: WaveStream ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release.apk.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}